<div id="card">
  <img
    id="avatar"
    [src]="avatarUrl()"
    [style.transform]="avatarTransform()"
    [style.--glow-color]="dropShadowColor()"
    [alt]="member().name"
  />
  <h1 id="name">{{ member().name }}</h1>
  <div id="roles" class="list">
    @for (role of member().roles; track role) {
      <span>• {{ role }}</span>
    }
  </div>

  <div id="skills" class="list">
    @for (skill of member().skills; track skill) {
      <span>• {{ skill }}</span>
    }
  </div>
</div>
